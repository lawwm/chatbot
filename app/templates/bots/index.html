{% extends "base.html" %}
{% block title %}Bots — Atome Bot Platform{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Available Bots</h1>
</div>

{% if not bots %}
<div class="card" style="text-align:center; padding:3rem;">
    <p class="text-muted">No bots available yet.</p>
</div>
{% else %}
<div class="card-grid">
    {% for bot in bots %}
    <div class="card">
        <h3>{{ bot.name }}</h3>
        <a href="/chat/{{ bot.slug }}" class="btn btn-primary mt-2">Start Chat</a>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
