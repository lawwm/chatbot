{% if tool_names %}
<div class="chat chat-start">
    <div style="display:flex; flex-direction:column; gap:0.3rem;">
        {% for name in tool_names %}
        <div style="display:inline-flex; align-items:center; gap:0.5rem; background:#f0f4ff; border:1px solid #c7d7fd; border-radius:999px; padding:0.25rem 0.85rem; font-size:0.72rem; color:#3b5bdb; width:fit-content; font-family:monospace;">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Calling tool {{ name }}
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
<!-- Assistant bubble -->
<div class="chat chat-start">
    <div class="chat-bubble text-sm leading-relaxed !bg-gray-100 !text-gray-900 md-content">{{ render_markdown(assistant_message) }}</div>
</div>
